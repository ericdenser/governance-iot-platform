server:
  port: 8087

mqtt:
  broker-url: tcp://${HOST_IP}:1883
  jwt-refresh-interval-ms: 30000
  client-id: agent-mqtt
  topic: status/#
  error-topic: error/#
  telemetry-topic: telemetry/#
  password: unused

govapi:
  url: ${GOVAPI_URL:http://localhost:8082}

# Rollout em waves: broadcasts acima do threshold são fatiados em waves de
# wave-size devices, espaçadas por wave-interval-ms. Manter em sincronia com
# ota.wave-* do govApi (dimensiona o TTL da presigned URL).
broadcast:
  wave-threshold: ${BROADCAST_WAVE_THRESHOLD:1}
  wave-size: ${BROADCAST_WAVE_SIZE:1}
  wave-interval-ms: ${BROADCAST_WAVE_INTERVAL_MS:10000}

event-handler:
  url: ${EVENT_HANDLER_URL:http://localhost:8085}

datalogger:
  url: http://localhost:8081

spring:
  data:                          
    redis:
      host: ${REDIS_STREAMS_HOST:localhost}
      port: ${REDIS_STREAMS_PORT:6380}
      # password: ${REDIS_STREAMS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  application:
    name: agent-mqtt
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
      client:
        registration:
          govapi:
            client-id: agent-mqtt
            client-secret: ${AGENT_MQTT_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          govapi:
            token-uri: ${KEYCLOAK_ISSUER_URI}/protocol/openid-connect/token
