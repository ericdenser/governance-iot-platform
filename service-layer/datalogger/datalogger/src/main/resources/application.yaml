server:
  port: 8081 

influxdb:
  url: http://localhost:8086
  token: ${INFLUX_TOKEN} 
  org: mackenzie
  bucket: telemetry_bucket

spring:
  data:
    redis:
      host: ${REDIS_STREAMS_HOST:localhost}
      port: ${REDIS_STREAMS_PORT:6380}
      # password: ${REDIS_STREAMS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

app:
  streams:
    # Identidade estável do consumer no grupo (sem PID) — herda o próprio PEL no restart.
    # Se escalar horizontal, cada réplica precisa de um REPLICA_ID distinto.
    replica-id: ${REPLICA_ID:0}
    # Intervalo do sweeper que reivindica mensagens pendentes órfãs (XPENDING + XCLAIM)
    sweep-interval-ms: 60000
