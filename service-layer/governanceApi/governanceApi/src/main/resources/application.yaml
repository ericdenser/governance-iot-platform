server:
  port: 8082

spring:
  servlet:
      multipart:
        max-file-size: 10MB
        max-request-size: 10MB
  mvc:
    static-path-pattern: /firmwares/**
  web:
    resources:
      static-locations: "file:${FIRMWARE_STORAGE_PATH},classpath:/static/"
  datasource:
    url: jdbc:postgresql://localhost:5432/cmdb_iot
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

infra:
  api-key: ${INFRA_API_KEY}
  ca_password: ${CA_PASSWORD}

mqtt:
  broker-url: mqtt://localhost:8883
  client-id: governance-api-publisher
  crl-path: ../../mosquitto/config/certs/revoked.crl

ota:
  firmware-storage-path: ${FIRMWARE_STORAGE_PATH}
  public-base-url: http://${HOST_IP}:8082/firmwares

agent:
  url: ${AGENT_URL}
