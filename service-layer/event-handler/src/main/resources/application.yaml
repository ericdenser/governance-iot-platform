server:
  port: 8085

spring:
  application:
    name: event-handler
  datasource:
    url: jdbc:postgresql://localhost:5432/event_handler
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          govapi:
            client-id: event-handler
            client-secret: ${EVENT_HANDLER_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          govapi:
            token-uri: ${KEYCLOAK_ISSUER_URI}/protocol/openid-connect/token
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

govapi:
  url: ${GOVAPI_URL:http://localhost:8082}

# Configuração do webhook dispatcher
webhook:
  timeout-ms: 5000
  max-retries: 3
  retry-delay-ms: 2000
