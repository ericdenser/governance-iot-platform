server:
  port: 8085

spring:
  application:
    name: event-handler
  datasource:
    url: jdbc:postgresql://localhost:5432/event_handler
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:                         
    redis:
      host: ${REDIS_STREAMS_HOST:localhost}
      port: ${REDIS_STREAMS_PORT:6380}
      # password: ${REDIS_STREAMS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          govapi:
            client-id: event-handler
            client-secret: ${EVENT_HANDLER_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          govapi:
            token-uri: ${KEYCLOAK_ISSUER_URI}/protocol/openid-connect/token
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

govapi:
  url: ${GOVAPI_URL:http://localhost:8082}

app:
  streams:
    # Identidade estável do consumer no grupo (sem PID) — herda o próprio PEL no restart.
    # Se escalar horizontal, cada réplica precisa de um REPLICA_ID distinto.
    replica-id: ${REPLICA_ID:0}
    # Intervalo do sweeper que reivindica mensagens pendentes órfãs (XPENDING + XCLAIM)
    sweep-interval-ms: 60000

# Configuração do webhook dispatcher
webhook:
  timeout-ms: 5000
  max-retries: 3
  retry-delay-ms: 2000
