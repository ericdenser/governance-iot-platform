syntax = "proto3";

package messaging;

service Messaging {
  rpc Subscribe(RegisterRequest) returns (stream Message);
  rpc SendMessage(Message) returns (MessageSentResponse);
}

message MessageSentResponse {
  string status = 1;
}

message RegisterRequest {
  string topic = 1;
}

message Message {
  string topic = 1;
  string from = 2;
  string message = 3;
}
