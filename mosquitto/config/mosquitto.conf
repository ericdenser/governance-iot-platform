# Logs
log_dest stdout
log_type all

# NOTA: NÃO usar per_listener_settings true — faz o auth_plugin (global)
# ser aplicado só ao último listener. Sem ele, plugin vale pra todos.

# ============================================================================
# Auth GLOBAL — plugin mosquitto-go-auth em modo remote
# govApi valida JWT via JWKS do Keycloak e retorna {"Ok":..., "Error":...}
# ============================================================================
allow_anonymous false

auth_plugin /mosquitto/go-auth.so
auth_opt_backends jwt
auth_opt_jwt_mode remote

auth_opt_jwt_host host.docker.internal
auth_opt_jwt_port 8082
auth_opt_jwt_with_tls false
auth_opt_jwt_getuser_uri /auth/mqtt-verify
auth_opt_jwt_aclcheck_uri /auth/mqtt-acl
auth_opt_jwt_response_mode json
auth_opt_jwt_params_mode json
auth_opt_jwt_http_method POST

auth_opt_acl_cache_seconds 30
auth_opt_auth_cache_seconds 60
# log_level debug spamma o JWT inteiro em CADA linha — usar só pra debug
auth_opt_log_level info
auth_opt_log_dest stdout

# ============================================================================
# Listener 1 — MQTT/TCP na 1883 (interno VM, agent-mqtt)
# ============================================================================
listener 1883

# ============================================================================
# Listener 2 — MQTT/WebSocket na 8884 (externo, via edge MackCloud, ESPs)
# ============================================================================
listener 8884
protocol websockets
