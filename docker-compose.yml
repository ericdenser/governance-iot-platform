
services:
  # 1. BROKER MQTT
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_broker
    ports:
      - "8883:8883" # Porta padrão MQTT TLS
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # 2. INFLUXDB (Write Model / Telemetria)
  influxdb:
    image: influxdb:2.7
    container_name: iot_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=mackenzie
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN} 
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: iot_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=cmdb_iot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  infra-executor:
    build: ./service-layer/infra-executor
    container_name: infra_executor
    ports:
      - "8089:8089"
    volumes:
     - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - INFRA_API_KEY=${INFRA_API_KEY}
    restart: unless-stopped
    depends_on:
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  postgres_data:
